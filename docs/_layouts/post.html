<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Raleway:wght@300;400&display=swap');
    body {
      font-family: 'Raleway', sans-serif;
      background: #faf8f5;
      color: #3a3a3a;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .post-container {
      max-width: 650px;
      width: 90%;
      margin: 3rem auto;
      background: white;
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      border: 1px solid #ede6db;
    }
    .post-date {
      color: #b8a88a;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .post-content {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      line-height: 1.9;
      color: #4a3a2a;
      white-space: pre-line;
    }
    .post-content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 2rem 0;
    }
    .back-link {
      display: inline-block;
      margin-top: 2rem;
      color: #b8a88a;
      text-decoration: none;
      font-size: 0.9rem;
      border-bottom: 1px solid #d9cdb8;
    }
    .footer {
      text-align: center;
      padding: 1.5rem;
      color: #b8a88a;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="post-container">
    <div class="post-date">{{ page.date | date: "%d · %m · %Y" }}</div>
    <div class="post-content">
      {{ content }}
    </div>
    <a href="{{ site.baseurl }}/" class="back-link">← Volver al inicio</a>
  </div>
  <div class="footer">
    <p>🖋️ El Poeta · 🛡️ El Guardián de la Emoción · 🎨 El Visualizador</p>
  </div>
</body>
</html>
