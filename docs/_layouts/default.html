<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fdfaf5;
      /* Sutil textura de papel */
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e5d9c6' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      color: #3a332a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    .main-header {
      width: 100%;
      padding: 3.5rem 2rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .main-header::before {
      content: "";
      position: absolute;
      top: -30%;
      left: -10%;
      width: 120%;
      height: 160%;
      background: radial-gradient(ellipse at 30% 20%, rgba(215,190,160,0.2) 0%, transparent 60%);
      z-index: 0;
    }

    .header-content {
      position: relative;
      z-index: 1;
    }

    .main-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.8rem;
      font-weight: 500;
      color: #5a4736;
      margin-bottom: 0.5rem;
      letter-spacing: 3px;
    }

    .divider {
      width: 70px;
      height: 2px;
      background: #c9ad7a;
      margin: 0.8rem auto 1.5rem;
      opacity: 0.7;
    }

    .subtitle {
      font-size: 1.15rem;
      color: #8b775a;
      font-weight: 300;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .posts-wrapper {
      width: 100%;
      max-width: 720px;
      margin: 2rem auto 3rem;
      padding: 0 1.8rem;
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .post-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2.2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
      border: 1px solid #ede3d1;
      transition: all 0.35s ease;
      animation: fadeUp 0.6s ease forwards;
      opacity: 0;
    }

    .post-card:nth-child(1) { animation-delay: 0.1s; }
    .post-card:nth-child(2) { animation-delay: 0.2s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.06);
      border-color: #d4bc8c;
    }

    .post-card .post-date {
      font-size: 0.8rem;
      color: #b2976a;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.4rem;
      font-weight: 400;
    }

    .post-card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      font-weight: 500;
      color: #4d3c2c;
      margin: 0.3rem 0 0.6rem;
      line-height: 1.3;
    }

    .post-card .post-excerpt {
      color: #6b5d4b;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 0.8rem;
      font-style: italic;
      border-left: 2px solid #d9c29e;
      padding-left: 1rem;
    }

    .post-card img {
      width: 100%;
      border-radius: 14px;
      margin: 1rem 0 0.3rem;
      border: 1px solid #f0e5d2;
      transition: transform 0.3s ease;
    }

    .post-card:hover img {
      transform: scale(1.01);
    }

    .read-link {
      display: inline-block;
      margin-top: 0.8rem;
      color: #b2976a;
      font-size: 0.9rem;
      font-weight: 400;
      border-bottom: 1px solid #d9c29e;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }

    .read-link:hover {
      color: #7a623f;
      border-color: #b2894b;
    }

    .main-footer {
      width: 100%;
      text-align: center;
      padding: 2.5rem 1rem;
      background: linear-gradient(0deg, #f7f0e4 0%, #fdfaf5 100%);
      border-top: 1px solid #e5d9c6;
      color: #8b775a;
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .agents {
      font-style: italic;
      color: #b2976a;
      letter-spacing: 0.5px;
    }

    @media (max-width: 600px) {
      .main-header h1 { font-size: 2.8rem; }
      .post-card { padding: 1.5rem; }
      .post-card h2 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <header class="main-header">
    <div class="header-content">
      <h1>{{ site.title }}</h1>
      <div class="divider"></div>
      <p class="subtitle">{{ site.description }}</p>
    </div>
  </header>

  <main class="posts-wrapper">
    {{ content }}
  </main>

  <footer class="main-footer">
    <p class="agents">🖋️ El Poeta · 🛡️ El Guardián de la Emoción · 🎨 El Visualizador</p>
    <p>Generado con inteligencia artificial · Actualizado diariamente</p>
  </footer>
</body>
</html>
